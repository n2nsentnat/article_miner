# Copy to secret.yaml (do not commit real values), edit, then:
#   kubectl apply -f secret.yaml -n article-miner
#
# Or create imperatively:
#   kubectl create secret generic article-miner-env -n article-miner \
#     --from-literal=NCBI_API_KEY=... \
#     --from-literal=OPENAI_API_KEY=...
apiVersion: v1
kind: Secret
metadata:
  name: article-miner-env
  namespace: article-miner
  labels:
    app.kubernetes.io/name: article-miner
type: Opaque
stringData:
  NCBI_API_KEY: ""
  NCBI_EMAIL: ""
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GEMINI_API_KEY: ""
