apiVersion: apps/v1
kind: Deployment
metadata:
  name: article-miner-api
  namespace: article-miner
  labels:
    app.kubernetes.io/name: article-miner
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: article-miner
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: article-miner
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          # Build and push your image, then set in kustomization or override:
          #   kubectl set image deploy/article-miner-api api=your-registry/article-miner:v0.1.0 -n article-miner
          image: article-miner:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          # Optional Secret (create from secret.example.yaml). If absent, pod still starts.
          envFrom:
            - secretRef:
                name: article-miner-env
                optional: true
          volumeMounts:
            - name: data
              mountPath: /app/article_miner_output
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          emptyDir: {}
