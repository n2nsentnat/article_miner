# Optional: enable TLS and set host before applying.
# kubectl apply -f ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: article-miner-api
  namespace: article-miner
  labels:
    app.kubernetes.io/name: article-miner
    app.kubernetes.io/component: api
  annotations:
    # nginx ingress example — adjust for your controller
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: article-miner.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: article-miner-api
                port:
                  name: http
  # tls:
  #   - hosts:
  #       - article-miner.example.com
  #     secretName: article-miner-tls
